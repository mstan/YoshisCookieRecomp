# game.cfg — Yoshi's Cookie (NES, Mapper 4 / MMC3, 8 PRG banks, 8 CHR ROM banks)
output_prefix yoshis-cookie

# Trampoline at $F424: reads 3 inline bytes (bank, addr_lo, addr_hi) after JSR.
# Bank switch function at $F46D: sets MMC3 R6/R7 to map 16KB at $8000-$BFFF.
trampoline F424 3 F46D 0 A BFFF
# $C024 is a JMP $F424 thunk — same trampoline, different entry point (394 call sites)
trampoline C024 3 F46D 0 A BFFF

# Inline dispatch at $F573: JSR $F573 followed by address table, A selects entry
inline_dispatch F573
# $C000 is a JMP $F573 thunk — same inline dispatch, different entry point (58 call sites)
inline_dispatch C000

# Extra functions not found by automatic discovery (dispatch misses)
extra_func -1 C048
