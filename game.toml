# game.toml — Yoshi's Cookie (NES, Mapper 4 / MMC3, 8 PRG banks, 8 CHR ROM banks)

[game]
output_prefix = "yoshis-cookie"

# ── Trampolines ────────────────────────────────────────────────────────────
# $F424: reads 3 inline bytes (bank, addr_lo, addr_hi) after JSR.
# Bank switch function at $F46D: sets MMC3 R6/R7 to map 16KB at $8000-$BFFF.
[[trampoline]]
addr = 0xF424
inline_bytes = 3
bs_fn_addr = 0xF46D

# $C024 is a JMP $F424 thunk — same trampoline, different entry point (394 call sites)
[[trampoline]]
addr = 0xC024
inline_bytes = 3
bs_fn_addr = 0xF46D

# ── Inline dispatch ────────────────────────────────────────────────────────
# $F573: JSR $F573 followed by address table, A selects entry
[[inline_dispatch]]
addr = 0xF573

# $C000 is a JMP $F573 thunk — same inline dispatch, different entry point (58 call sites)
[[inline_dispatch]]
addr = 0xC000

# ── Extra functions (dispatch misses) ──────────────────────────────────────
[functions]
fixed = [0xC048]
bank0 = [0x8221, 0x8109, 0x8101, 0x8106, 0x8104]
bank1 = [0x8146, 0x8CFE, 0x8C54, 0x9260, 0x9360, 0xAFDC]
bank3 = [0x8BAA]
bank4 = [0xA819, 0xB489, 0x8149]
bank5 = [0x9B8F, 0x91C4]
bank6 = [0x9CFA, 0x813C, 0x82A4, 0x8382]

