[game]
output_prefix = "yoshis-cookie"

[[trampoline]]
addr = 0xF424
inline_bytes = 3
bank_reg = "A"
addr_adjust = 1
bs_fn_addr = 0xF46D
bank_save_addr = 0xBFFF

# $CAA0-$CABD: 15-entry pointer table inside func_CA38 (pointers to $CE34-$CF55)
[[data_region]]
bank = 7
start = 0xCAA0
end = 0xCABE

# Inline dispatch: JSR $F573 followed by inline pointer table indexed by A
[[inline_dispatch]]
addr = 0xF573

# Bank 1: large data table ($B2E7-$B6FB) — game configuration/level data
[[data_region]]
bank = 1
start = 0xB2E7
end = 0xB6FB
